# Foundry 配置檔
# 完整文檔：https://book.getfoundry.sh/config/

[profile.default]
# 合約原始碼目錄
src = "src"

# 測試檔案目錄
test = "test"

# 部署腳本目錄
script = "script"

# 編譯輸出目錄
out = "out"

# 依賴庫目錄
libs = ["lib"]

# Solidity 編譯器版本
solc = "0.8.20"

# 優化設定
optimizer = true
optimizer_runs = 200

# EVM 版本
evm_version = "paris"

# 顯示測試的 gas 報告
gas_reports = ["*"]

# Fuzz 測試設定
[fuzz]
# Fuzz 測試執行次數
runs = 256
# 最大測試深度
max_test_rejects = 65536

# 格式化設定
[fmt]
# 每行最大字元數
line_length = 100
# Tab 大小
tab_width = 4
# 括號間距
bracket_spacing = false
